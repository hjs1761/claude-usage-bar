name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Version from tag
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build + package (CI, no install)
        env:
          DOORAY_HOOK_URL: ${{ secrets.DOORAY_HOOK_URL }}
          CI: "1"
          VER: ${{ steps.ver.outputs.v }}
        run: bash scripts/package_app.sh release "$VER"
      - name: Zip app
        run: ditto -c -k --keepParent ".build/Agent Usage Monitor.app" "agent-usage-monitor-mac-${GITHUB_REF_NAME}.zip"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" "agent-usage-monitor-mac-${GITHUB_REF_NAME}.zip" --generate-notes --repo "${{ github.repository }}"
